<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}Medley{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #141419;
      --surface-2: #1c1c24;
      --border: #2a2a35;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-soft: rgba(139, 92, 246, 0.15);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, 0.12);
      --success: #34d399;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.18), transparent),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #a78bfa; }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.75rem 1rem;
      margin-bottom: 2rem;
      background: rgba(20, 20, 25, 0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand {
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-right: auto;
    }

    .brand span { color: var(--accent); }

    .nav a {
      padding: 0.5rem 0.875rem;
      border-radius: 8px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.9375rem;
      transition: color 0.15s, background 0.15s;
    }

    .nav a:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    .nav a.active {
      color: var(--text);
      background: var(--accent-soft);
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 1.5rem;
      font-size: 0.9375rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    .card-title {
      margin: 0 0 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
    }

    label span {
      display: block;
      margin-bottom: 0.35rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    textarea { resize: vertical; min-height: 8rem; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 640px) {
      .shell {
        padding: 1rem 1rem 2.5rem;
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
      }

      .nav {
        gap: 0.35rem;
        padding: 0.65rem 0.75rem;
        margin-bottom: 1.5rem;
      }

      .nav .brand {
        width: 100%;
        margin-right: 0;
        margin-bottom: 0.25rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--border);
      }

      .nav a:not(.brand) {
        flex: 1 1 calc(50% - 0.2rem);
        text-align: center;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .nav .inline-form {
        flex: 1 1 calc(50% - 0.2rem);
        display: flex;
      }

      .nav .inline-form .btn {
        flex: 1;
        min-height: 44px;
      }

      h1 { font-size: 1.5rem; }

      .subtitle { margin-bottom: 1.25rem; }

      .card { padding: 1rem; }

      .row { grid-template-columns: 1fr; }

      input, textarea, select {
        font-size: 16px;
      }

      form > .btn-primary,
      .card form .btn-primary {
        width: 100%;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .actions .btn,
      .actions a.btn {
        width: 100%;
        text-align: center;
      }

      .load-more .btn {
        width: 100%;
        max-width: 20rem;
      }

      .table-wrap {
        -webkit-overflow-scrolling: touch;
      }

      .table-wrap table,
      .table-wrap thead,
      .table-wrap tbody,
      .table-wrap th,
      .table-wrap td,
      .table-wrap tr {
        display: block;
      }

      .table-wrap thead { display: none; }

      .table-wrap tbody tr {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
      }

      .table-wrap tbody tr:hover td { background: none; }

      .table-wrap tbody tr:last-child { border-bottom: none; }

      .table-wrap td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 0.35rem 0;
        border-bottom: none;
        text-align: right;
      }

      .table-wrap td::before {
        content: attr(data-label);
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        flex-shrink: 0;
        text-align: left;
      }

      .table-wrap td[data-label=""]::before { content: none; }

      .table-wrap td:first-child {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
        padding-top: 0;
        padding-bottom: 0.75rem;
        margin-bottom: 0.35rem;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      .table-wrap td:first-child::before { content: none; }

      .table-wrap td:has(.actions) {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
        padding-top: 0.75rem;
        margin-top: 0.25rem;
        border-top: 1px solid var(--border);
        text-align: left;
      }

      .table-wrap td:has(.actions)::before { content: none; }

      .table-wrap td:has(.actions) .actions {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .table-wrap td:has(.actions) .actions .btn {
        width: auto;
        flex: 1 1 calc(50% - 0.25rem);
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      font: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid transparent;
      padding: 0.4rem 0.75rem;
      font-size: 0.8125rem;
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.2);
    }

    .alert {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9375rem;
    }

    .alert-error {
      background: var(--danger-soft);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #fecaca;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9375rem;
    }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr:hover td { background: rgba(255, 255, 255, 0.02); }

    .actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: #c4b5fd;
    }

    .score {
      font-variant-numeric: tabular-nums;
      color: var(--success);
      font-weight: 600;
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }

    .load-more {
      text-align: center;
      margin-top: 1.5rem;
    }

    .inline-form { display: inline; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a class="brand" href="/">Med<span>ley</span></a>
      {% block nav %}{% endblock %}
    </nav>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
